apiVersion: v1
kind: Service
metadata:
  name: powsybl-api
  namespace: app-zone
spec:
  selector:
    app: powsybl-api
  ports:
  - port: 8000
    targetPort: 8000
    name: http
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: powsybl-api
  namespace: app-zone
  labels:
    app: powsybl-api
    zone: application
spec:
  replicas: 2
  selector:
    matchLabels:
      app: powsybl-api
  template:
    metadata:
      labels:
        app: powsybl-api
        zone: application
    spec:
      nodeSelector:
        zone: application
      containers:
      - name: api
        image: localhost/powsybl-api:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        env:
        - name: INFLUXDB_URL
          value: "http://influxdb.data-zone.svc.cluster.local:8086"
        - name: INFLUXDB_TOKEN
          value: "my-super-secret-auth-token"
        - name: INFLUXDB_ORG
          value: "substation"
        - name: INFLUXDB_BUCKET
          value: "telemetry"
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
