apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: ied-simulator
  namespace: ot-zone
spec:
  output:
    to:
      kind: ImageStreamTag
      name: ied-simulator:latest
  source:
    type: Binary
    binary: {}
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Dockerfile
  triggers: []
---
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: ied-simulator
  namespace: ot-zone
spec:
  lookupPolicy:
    local: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ied-simulator
  namespace: ot-zone
  labels:
    app: ied-simulator
    zone: ot
spec:
  replicas: 3  # 複数のIEDをシミュレート
  selector:
    matchLabels:
      app: ied-simulator
  template:
    metadata:
      labels:
        app: ied-simulator
        zone: ot
    spec:
      tolerations:
      - key: "node.kubernetes.io/disk-pressure"
        operator: "Exists"
        effect: "NoSchedule"
      containers:
      - name: ied-simulator
        image: image-registry.openshift-image-registry.svc:5000/ot-zone/ied-simulator:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: STATION_ID
          value: "station-a"
        - name: IED_ID
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: DATA_INTERVAL
          value: "1.0"
        - name: OUTPUT_HOST
          value: "edge-collector.edge-zone.svc.cluster.local"
        - name: OUTPUT_PORT
          value: "8888"
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: ied-simulator
  namespace: ot-zone
spec:
  selector:
    app: ied-simulator
  ports:
  - port: 8080
    targetPort: 8080
    name: http
  type: ClusterIP
  # Headless service to allow FledgePOWER to discover individual IED pods
  clusterIP: None
