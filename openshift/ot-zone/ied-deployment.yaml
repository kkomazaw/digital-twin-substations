apiVersion: apps/v1
kind: Deployment
metadata:
  name: ied-simulator
  namespace: ot-zone
  labels:
    app: ied-simulator
    zone: ot
spec:
  replicas: 3  # 複数のIEDをシミュレート
  selector:
    matchLabels:
      app: ied-simulator
  template:
    metadata:
      labels:
        app: ied-simulator
        zone: ot
    spec:
      tolerations:
      - key: "node.kubernetes.io/disk-pressure"
        operator: "Exists"
        effect: "NoSchedule"
      containers:
      - name: ied-simulator
        image: image-registry.openshift-image-registry.svc:5000/digital-twin/ied-simulator:latest
        imagePullPolicy: Always
        env:
        - name: STATION_ID
          value: "station-a"
        - name: IED_ID
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: DATA_INTERVAL
          value: "1.0"
        - name: OUTPUT_HOST
          value: "edge-collector.edge-zone.svc.cluster.local"
        - name: OUTPUT_PORT
          value: "8888"
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
