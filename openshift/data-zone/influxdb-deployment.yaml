apiVersion: v1
kind: Service
metadata:
  name: influxdb
  namespace: data-zone
spec:
  selector:
    app: influxdb
  ports:
  - port: 8086
    targetPort: 8086
    name: http
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: influxdb
  namespace: data-zone
  labels:
    app: influxdb
    zone: data
spec:
  replicas: 1
  selector:
    matchLabels:
      app: influxdb
  template:
    metadata:
      labels:
        app: influxdb
        zone: data
    spec:
      tolerations:
      - key: "node.kubernetes.io/disk-pressure"
        operator: "Exists"
        effect: "NoSchedule"
      securityContext:
        fsGroup: 1000
      containers:
      - name: influxdb
        image: docker.io/library/influxdb:2.7-alpine
        ports:
        - containerPort: 8086
        env:
        - name: DOCKER_INFLUXDB_INIT_MODE
          value: "setup"
        - name: DOCKER_INFLUXDB_INIT_USERNAME
          value: "admin"
        - name: DOCKER_INFLUXDB_INIT_PASSWORD
          value: "adminpassword"
        - name: DOCKER_INFLUXDB_INIT_ORG
          value: "substation"
        - name: DOCKER_INFLUXDB_INIT_BUCKET
          value: "telemetry"
        - name: DOCKER_INFLUXDB_INIT_ADMIN_TOKEN
          value: "my-super-secret-auth-token"
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        volumeMounts:
        - name: influxdb-data
          mountPath: /var/lib/influxdb2
        - name: influxdb-config
          mountPath: /etc/influxdb2
      volumes:
      - name: influxdb-data
        emptyDir: {}
      - name: influxdb-config
        emptyDir: {}
