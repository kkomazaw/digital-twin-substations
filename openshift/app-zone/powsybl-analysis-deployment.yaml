apiVersion: v1
kind: Service
metadata:
  name: powsybl-analysis
  namespace: app-zone
spec:
  selector:
    app: powsybl-analysis
  ports:
  - port: 8001
    targetPort: 8001
    name: http
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: powsybl-analysis
  namespace: app-zone
  labels:
    app: powsybl-analysis
    zone: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: powsybl-analysis
  template:
    metadata:
      labels:
        app: powsybl-analysis
        zone: app
    spec:
      containers:
      - name: powsybl-analysis
        image: image-registry.openshift-image-registry.svc:5000/app-zone/powsybl-analysis:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8001
        env:
        - name: INFLUXDB_URL
          value: "http://influxdb.data-zone.svc.cluster.local:8086"
        - name: INFLUXDB_TOKEN
          value: "my-super-secret-auth-token"
        - name: INFLUXDB_ORG
          value: "substation"
        - name: INFLUXDB_BUCKET
          value: "telemetry"
        - name: REDIS_HOST
          value: "redis.data-zone.svc.cluster.local"
        - name: REDIS_PORT
          value: "6379"
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 2Gi
        livenessProbe:
          httpGet:
            path: /
            port: 8001
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 8001
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: powsybl-analysis
  namespace: app-zone
spec:
  output:
    to:
      kind: ImageStreamTag
      name: powsybl-analysis:latest
  source:
    type: Binary
    binary: {}
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Dockerfile
  resources:
    limits:
      cpu: "1"
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 1Gi
  triggers: []
---
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: powsybl-analysis
  namespace: app-zone
spec:
  lookupPolicy:
    local: true
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: powsybl-analysis
  namespace: app-zone
spec:
  to:
    kind: Service
    name: powsybl-analysis
  port:
    targetPort: http
