apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-topology
  namespace: it-zone
data:
  topology.json: |
    {
      "annotations": {
        "list": []
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "liveNow": true,
      "panels": [
        {
          "datasource": {
            "type": "grafana-infinity-datasource",
            "uid": "powsybl-api"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "custom": {
                "hideFrom": {
                  "tooltip": false,
                  "viz": false,
                  "legend": false
                }
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "red",
                    "value": 80
                  }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": {
            "h": 20,
            "w": 24,
            "x": 0,
            "y": 0
          },
          "id": 1,
          "options": {
            "edges": {
              "mainStatUnit": "",
              "secondaryStatUnit": ""
            },
            "nodes": {
              "mainStatUnit": "",
              "secondaryStatUnit": "",
              "arcs": [
                {
                  "field": "arc__healthy",
                  "color": "green"
                }
              ]
            }
          },
          "targets": [
            {
              "datasource": {
                "type": "grafana-infinity-datasource",
                "uid": "powsybl-api"
              },
              "format": "table",
              "refId": "A",
              "source": "url",
              "type": "json",
              "url": "http://powsybl-api.app-zone.svc.cluster.local:8000/topology",
              "url_options": {
                "method": "GET"
              },
              "root_selector": "nodes",
              "columns": [
                {"selector": "id", "text": "id", "type": "string"},
                {"selector": "title", "text": "title", "type": "string"},
                {"selector": "mainStat", "text": "mainStat", "type": "string"},
                {"selector": "secondaryStat", "text": "secondaryStat", "type": "string"},
                {"selector": "arc__healthy", "text": "arc__healthy", "type": "number"}
              ]
            },
            {
              "datasource": {
                "type": "grafana-infinity-datasource",
                "uid": "powsybl-api"
              },
              "format": "table",
              "refId": "B",
              "source": "url",
              "type": "json",
              "url": "http://powsybl-api.app-zone.svc.cluster.local:8000/topology",
              "url_options": {
                "method": "GET"
              },
              "root_selector": "edges",
              "columns": [
                {"selector": "id", "text": "id", "type": "string"},
                {"selector": "source", "text": "source", "type": "string"},
                {"selector": "target", "text": "target", "type": "string"},
                {"selector": "mainStat", "text": "mainStat", "type": "string"},
                {"selector": "secondaryStat", "text": "secondaryStat", "type": "string"}
              ]
            }
          ],
          "title": "Data Flow Topology",
          "type": "nodeGraph"
        }
      ],
      "refresh": "5s",
      "schemaVersion": 38,
      "style": "dark",
      "tags": ["topology", "fledgepower", "dataflow"],
      "templating": {
        "list": []
      },
      "time": {
        "from": "now-5m",
        "to": "now"
      },
      "timepicker": {},
      "timezone": "",
      "title": "Substation Data Flow Topology",
      "uid": "topology-monitor",
      "version": 0,
      "weekStart": ""
    }
