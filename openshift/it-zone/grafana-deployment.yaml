apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: it-zone
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
    - name: InfluxDB
      type: influxdb
      uid: influxdb
      access: proxy
      url: http://influxdb.data-zone.svc.cluster.local:8086
      jsonData:
        version: Flux
        organization: substation
        defaultBucket: telemetry
        tlsSkipVerify: true
      secureJsonData:
        token: my-super-secret-auth-token
    - name: PowSyBl API
      type: yesoreyeram-infinity-datasource
      uid: powsybl-api
      access: proxy
      url: http://powsybl-api.app-zone.svc.cluster.local:8000
      jsonData:
        tlsSkipVerify: true
      editable: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-config
  namespace: it-zone
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
    - name: 'default'
      orgId: 1
      folder: ''
      type: file
      disableDeletion: false
      editable: true
      options:
        path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-substation
  namespace: it-zone
data:
  substation-overview.json: |
    {
      "annotations": {
        "list": []
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "datasource": {
            "type": "influxdb",
            "uid": "influxdb"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "custom": {
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "axisLabel": "",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "line",
                "fillOpacity": 10,
                "gradientMode": "none",
                "hideFrom": {
                  "tooltip": false,
                  "viz": false,
                  "legend": false
                },
                "lineInterpolation": "linear",
                "lineWidth": 1,
                "pointSize": 5,
                "scaleDistribution": {
                  "type": "linear"
                },
                "showPoints": "auto",
                "spanNulls": false,
                "stacking": {
                  "group": "A",
                  "mode": "none"
                },
                "thresholdsStyle": {
                  "mode": "off"
                }
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              },
              "unit": "hertz"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 0
          },
          "id": 1,
          "options": {
            "legend": {
              "calcs": [],
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "single",
              "sort": "none"
            }
          },
          "targets": [
            {
              "datasource": {
                "type": "influxdb",
                "uid": "influxdb"
              },
              "query": "from(bucket: \"telemetry\")\n  |> range(start: v.timeRangeStart, stop: v.timeRangeStop)\n  |> filter(fn: (r) => r[\"_measurement\"] == \"substation_telemetry\")\n  |> filter(fn: (r) => r[\"_field\"] == \"frequency\")\n  |> aggregateWindow(every: v.windowPeriod, fn: mean, createEmpty: false)\n  |> yield(name: \"mean\")",
              "refId": "A"
            }
          ],
          "title": "Frequency (Hz)",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "influxdb",
            "uid": "influxdb"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "red",
                    "value": 1
                  }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 0
          },
          "id": 2,
          "options": {
            "orientation": "auto",
            "reduceOptions": {
              "values": false,
              "calcs": [
                "lastNotNull"
              ],
              "fields": ""
            },
            "showThresholdLabels": false,
            "showThresholdMarkers": true
          },
          "pluginVersion": "10.0.0",
          "targets": [
            {
              "datasource": {
                "type": "influxdb",
                "uid": "influxdb"
              },
              "query": "from(bucket: \"telemetry\")\n  |> range(start: -5m)\n  |> filter(fn: (r) => r[\"_measurement\"] == \"substation_telemetry\")\n  |> filter(fn: (r) => r[\"_field\"] == \"alarm\")\n  |> aggregateWindow(every: 1m, fn: sum, createEmpty: false)\n  |> yield(name: \"sum\")",
              "refId": "A"
            }
          ],
          "title": "Alarms (Last 5min)",
          "type": "gauge"
        }
      ],
      "schemaVersion": 38,
      "style": "dark",
      "tags": ["substation", "telemetry"],
      "templating": {
        "list": []
      },
      "time": {
        "from": "now-15m",
        "to": "now"
      },
      "timepicker": {},
      "timezone": "",
      "title": "Substation Overview",
      "uid": "substation-overview",
      "version": 0,
      "weekStart": ""
    }
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: it-zone
spec:
  selector:
    app: grafana
  ports:
  - port: 3000
    targetPort: 3000
    name: http
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: it-zone
  labels:
    app: grafana
    zone: it
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
        zone: it
    spec:
      tolerations:
      - key: "node.kubernetes.io/disk-pressure"
        operator: "Exists"
        effect: "NoSchedule"
      containers:
      - name: grafana
        image: docker.io/grafana/grafana:10.2.0
        ports:
        - containerPort: 3000
        env:
        - name: GF_SECURITY_ADMIN_USER
          value: admin
        - name: GF_SECURITY_ADMIN_PASSWORD
          value: admin
        - name: GF_INSTALL_PLUGINS
          value: "yesoreyeram-infinity-datasource"
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        volumeMounts:
        - name: grafana-storage
          mountPath: /var/lib/grafana
        - name: grafana-datasources
          mountPath: /etc/grafana/provisioning/datasources
        - name: grafana-dashboards-config
          mountPath: /etc/grafana/provisioning/dashboards
        - name: grafana-dashboard-substation
          mountPath: /var/lib/grafana/dashboards
        - name: grafana-dashboard-topology
          mountPath: /var/lib/grafana/dashboards/topology
        - name: grafana-dashboard-powerflow
          mountPath: /var/lib/grafana/dashboards/powerflow
        - name: grafana-dashboard-analysis
          mountPath: /var/lib/grafana/dashboards/analysis
        - name: grafana-dashboard-network-topology
          mountPath: /var/lib/grafana/dashboards/network-topology
      volumes:
      - name: grafana-storage
        emptyDir: {}
      - name: grafana-datasources
        configMap:
          name: grafana-datasources
      - name: grafana-dashboards-config
        configMap:
          name: grafana-dashboards-config
      - name: grafana-dashboard-substation
        configMap:
          name: grafana-dashboard-substation
      - name: grafana-dashboard-topology
        configMap:
          name: grafana-dashboard-topology
      - name: grafana-dashboard-powerflow
        configMap:
          name: grafana-dashboard-powerflow
      - name: grafana-dashboard-analysis
        configMap:
          name: grafana-dashboard-analysis
      - name: grafana-dashboard-network-topology
        configMap:
          name: grafana-dashboard-network-topology
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: grafana
  namespace: it-zone
spec:
  to:
    kind: Service
    name: grafana
  port:
    targetPort: http
